<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">

  <!-- ICON MARK -->
  <g transform="translate(0, 10)">

    <!-- Outer rounded square -->
    <rect x="0" y="0" width="116" height="116" rx="22" fill="#FF6B1A"/>

    <!-- Inner shelf structure — white lines + blocks -->
    <!-- Shelf 1 (top) -->
    <rect x="18" y="28" width="80" height="10" rx="3" fill="white"/>
    <!-- Items above shelf 1 -->
    <rect x="22" y="14" width="16" height="14" rx="3" fill="white" opacity="0.9"/>
    <rect x="44" y="18" width="12" height="10" rx="3" fill="white" opacity="0.55"/>
    <rect x="62" y="16" width="20" height="12" rx="3" fill="white" opacity="0.7"/>

    <!-- Shelf 2 (middle) -->
    <rect x="18" y="58" width="80" height="10" rx="3" fill="white"/>
    <!-- Items above shelf 2 -->
    <rect x="22" y="44" width="22" height="14" rx="3" fill="white" opacity="0.55"/>
    <rect x="50" y="46" width="14" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="70" y="44" width="18" height="14" rx="3" fill="white" opacity="0.7"/>

    <!-- Shelf 3 (bottom) -->
    <rect x="18" y="88" width="80" height="10" rx="3" fill="white"/>
    <!-- Items above shelf 3 -->
    <rect x="22" y="74" width="10" height="14" rx="3" fill="white" opacity="0.7"/>
    <rect x="38" y="72" width="18" height="16" rx="3" fill="white" opacity="0.9"/>
    <rect x="62" y="76" width="26" height="12" rx="3" fill="white" opacity="0.55"/>

  </g>

  <!-- WORDMARK -->
  <g transform="translate(136, 0)">
    <!-- "esto" in white -->
    <text x="0" y="100" 
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="88"
      font-weight="900"
      letter-spacing="-3"
      fill="white">esto</text>
    <!-- "kai" in orange -->
    <text x="222" y="100"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="88"
      font-weight="900"
      letter-spacing="-3"
      fill="#FF6B1A">kai</text>

    <!-- Tagline -->
    <text x="2" y="126"
      font-family="Arial, sans-serif"
      font-size="13"
      font-weight="400"
      letter-spacing="4"
      fill="white"
      opacity="0.35">CONTROLE DE ESTOQUE INTELIGENTE</text>
  </g>

</svg>
